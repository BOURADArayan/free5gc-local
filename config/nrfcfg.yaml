info:
  version: 1.0.2
  description: NRF initial local configuration
configuration:
  MongoDBName: free5gc
  MongoDBUrl: mongodb://127.0.0.1:27017
  sbi:
    scheme: http
    registerIPv4: 127.0.0.10
    bindingIPv4: 127.0.0.10
    port: 8000
    cert:
      pem: cert/nrf.pem
      key: cert/nrf.key
    rootcert:
      pem: cert/root.pem
      key: cert/root.key
    oauth: true
  DefaultPlmnId:
    mcc: 208
    mnc: 93
  serviceNameList:
  - nnrf-nfm
  - nnrf-disc
  metrics:
    enable: true
    scheme: http
    bindingIPv4: 127.0.0.10
    port: 9093
    namespace: free5gc
logger:
  enable: true
  level: info
  reportCaller: false
metrics:
  enable: true
  scheme: http
  bindingIPv4: 127.0.0.10
  port: 9093
  namespace: free5gc
