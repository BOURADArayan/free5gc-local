info:
  version: 1.0.7
  description: SMF initial local configuration
configuration:
  smfName: SMF
  sbi:
    scheme: http
    registerIPv4: 127.0.0.2
    bindingIPv4: 127.0.0.2
    port: 8000
    tls:
      key: cert/smf.key
      pem: cert/smf.pem
  serviceNameList:
  - nsmf-pdusession
  - nsmf-event-exposure
  - nsmf-oam
  snssaiInfos:
  - sNssai:
      sst: 1
      sd: '001083'
    dnnInfos:
    - dnn: internet
      dns:
        ipv4: 8.8.8.8
        ipv6: 2001:4860:4860::8888
  - sNssai:
      sst: 1
      sd: '01B669'
    dnnInfos:
    - dnn: internet
      dns:
        ipv4: 8.8.8.8
        ipv6: 2001:4860:4860::8888
  plmnList:
  - mcc: '208'
    mnc: '93'
  locality: area1
  pfcp:
    nodeID: 127.0.0.1
    listenAddr: 127.0.0.1
    externalAddr: 127.0.0.1
    assocFailAlertInterval: 10s
    assocFailRetryInterval: 30s
    heartbeatInterval: 10s
  userplaneInformation:
    upNodes:
      gNB1:
        type: AN
      UPF:
        type: UPF
        nodeID: 127.0.0.8
        addr: 127.0.0.8
        sNssaiUpfInfos:
        - sNssai:
            sst: 1
            sd: '001083'
          dnnUpfInfoList:
          - dnn: internet
            pools:
            - cidr: 10.60.0.0/16
            staticPools:
            - cidr: 10.60.100.0/24
        - sNssai:
            sst: 1
            sd: '01B669'
          dnnUpfInfoList:
          - dnn: internet
            pools:
            - cidr: 10.61.0.0/16
            staticPools:
            - cidr: 10.61.100.0/24
        interfaces:
        - interfaceType: N3
          endpoints:
          - 127.0.0.8
          networkInstances:
          - internet
    links:
    - A: gNB1
      B: UPF
  t3591:
    enable: true
    expireTime: 16s
    maxRetryTimes: 3
  t3592:
    enable: true
    expireTime: 16s
    maxRetryTimes: 3
  nrfUri: http://127.0.0.10:8000
  nrfCertPem: cert/nrf.pem
  urrPeriod: 30
  urrThreshold: 500000
  requestedUnit: 1000
  metrics:
    enable: true
    scheme: http
    bindingIPv4: 127.0.0.2
    port: 9092
    namespace: free5gc
logger:
  enable: true
  level: info
  reportCaller: false
metrics:
  enable: true
  scheme: http
  bindingIPv4: 127.0.0.2
  port: 9092
  namespace: free5gc
